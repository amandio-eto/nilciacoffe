<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slider With QR Code</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.container{
display:flex;
width:1100px;
margin:50px auto;
gap:30px;
align-items:center;
}

/* SLIDER */

.slider-container{
width:750px;
overflow:hidden;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
position:relative;
}

.slider{
display:flex;
transition:0.5s;
}

.slide{
min-width:100%;
}

.slide img,
.slide video{
width:100%;
height:420px;
object-fit:cover;
}

/* BUTTON */

button{
position:absolute;
top:50%;
transform:translateY(-50%);
background:black;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
font-size:18px;
opacity:0.7;
}

.prev{
left:10px;
}

.next{
right:10px;
}

/* QR CODE */

.qr-box{
width:300px;
text-align:center;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.qr-box img{
width:200px;
}

.qr-box h2{
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- SLIDER -->
<div class="slider-container">

<div class="slider" id="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e">
</div>

<div class="slide">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-making-coffee-1572/1080p.mp4">
</video>
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1485808191679-5f86510681a2">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1498804103079-a6351b050096">
</div>

<div class="slide">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-coffee-pouring-into-cup-1574/1080p.mp4">
</video>
</div>

</div>

<button class="prev" onclick="prevSlide()">❮</button>
<button class="next" onclick="nextSlide()">❯</button>

</div>


<!-- QR CODE -->
<div class="qr-box">

<h2>Scan Menu</h2>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://example.com">

<p>Scan this QR to open menu</p>

</div>

</div>


<script>

let slider=document.getElementById("slider");
let index=0;

function nextSlide(){
index++;
if(index>9){index=0;}
slider.style.transform="translateX(-"+(index*100)+"%)";
}

function prevSlide(){
index--;
if(index<0){index=9;}
slider.style.transform="translateX(-"+(index*100)+"%)";
}

setInterval(nextSlide,4000);

</script>

</body>
</html>
